<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="appTitle">匹克球團搶位系統</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* 🎨 莫蘭迪柔和色彩與主題變數 */
    :root {
      --bg-main: #f4f6f8;
      --card-bg: #ffffff;
      --text-main: #2c3e50;
      --text-muted: #7f8c8d;
      --box-bg: #f8fafc;
      --border-color: #cbd5e0;
      
      /* 莫蘭迪風格主題色 */
      --theme-mon: linear-gradient(135deg, #7f8c8d, #95a5a6);
      --theme-tue: linear-gradient(135deg, #708090, #536270);
      --theme-wed: linear-gradient(135deg, #d69e2e, #b7791f);
      --theme-thu: linear-gradient(135deg, #8fbc8f, #6b8e23);
      --theme-fri: linear-gradient(135deg, #d8a48f, #bc7d63);
      --theme-sat: linear-gradient(135deg, #e6b89c, #cd853f);
      --theme-sun: linear-gradient(135deg, #805ad5, #6b46c1);
      
      /* 💡 頂部 Banner 固定質感深藍色 */
      --banner-fixed: linear-gradient(135deg, #2b4c7e, #132238);
    }

    /* 🌙 暗色主題 Mode (Dark Mode) */
    body.dark-mode {
      --bg-main: #1a202c;
      --card-bg: #2d3748;
      --text-main: #edf2f7;
      --text-muted: #a0aec0;
      --box-bg: #1f2937;
      --border-color: #4a5568;
    }

    body { 
      font-family: 'PingFang TC', 'Microsoft JhengHei', Arial, sans-serif; 
      background-color: var(--bg-main); 
      color: var(--text-main);
      padding: 15px; 
      margin: 0;
      text-align: center; 
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      transition: background-color 0.3s, color 0.3s;
    }

    .main-wrapper {
      flex: 1;
    }

    .card { 
      background: var(--card-bg); 
      max-width: 500px; 
      margin: 10px auto; 
      padding: 24px; 
      border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
      transition: all 0.3s ease; 
    }

    /* 📌 頂部 Banner */
    .header-banner {
      padding: 22px 15px;
      border-radius: 16px;
      background: var(--banner-fixed) !important;
      color: white;
      margin-bottom: 20px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
      text-align: center;
    }
    .header-banner h1 { font-size: 28px; margin: 0 0 8px 0; font-weight: 700; letter-spacing: 0.5px; }
    .header-banner .date-sub { font-size: 17px; opacity: 0.95; }

    /* 💡 溫馨提醒卡片（可伸縮摺疊） */
    .notice-card {
      background-color: rgba(221, 107, 32, 0.08);
      border-left: 4px solid #dd6b20;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-main);
      text-align: left;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    }
    .notice-header {
      font-size: 16px;
      font-weight: bold;
      margin: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .notice-header .arrow-icon {
      font-size: 12px;
      transition: transform 0.3s;
    }
    .notice-content {
      margin-top: 10px;
      display: none;
      border-top: 1px dashed var(--border-color);
      padding-top: 10px;
    }
    .notice-card.open .notice-content {
      display: block;
    }
    .notice-card.open .arrow-icon {
      transform: rotate(180deg);
    }

    /* 📊 狀態欄與資訊卡片 */
    .status-box { 
      background-color: var(--box-bg); 
      color: var(--text-main); 
      padding: 16px; 
      border-radius: 12px; 
      font-size: 20px; 
      font-weight: 600;
      margin-bottom: 20px; 
      border: 1px solid var(--border-color); 
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }
    .seats-highlight { font-size: 32px; color: #e53e3e; font-weight: 800; }

    .session-container { 
      margin: 20px 0; 
      padding: 18px; 
      background: var(--box-bg); 
      border: 1.5px dashed var(--border-color); 
      border-radius: 16px; 
    }
    .session-container h3 {
      margin-top:0; 
      color: var(--text-main); 
      font-size: 18px; 
      text-align: left;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    
    /* 📅 場次按鈕（字體放大、支援換行） */
    .session-btn { 
      display: block; 
      width: 100%; 
      margin: 14px 0; 
      padding: 18px 16px; 
      font-size: 19px; /* 🔤 按鈕資料字型放大 */
      line-height: 1.4;
      border-radius: 14px; 
      cursor: pointer; 
      color: white; 
      border: 2px solid transparent; 
      font-weight: 700; 
      transition: all 0.25s ease;
      box-sizing: border-box;
      opacity: 0.95;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      text-align: center;
    }
    .session-btn:hover:not(:disabled) { opacity: 1; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
    .session-btn:disabled { background: #cbd5e0 !important; color: #718096 !important; cursor: not-allowed; opacity: 0.7; transform: none; box-shadow: none; }

    .session-btn.selected {
      opacity: 1 !important;
      transform: scale(1.02) !important;
      border: 3px solid #2d3748 !important;
      box-shadow: 0 8px 20px rgba(0,0,0,0.22) !important;
    }

    /* 各天別主題色 */
    .theme-mon { background: var(--theme-mon) !important; }
    .theme-tue { background: var(--theme-tue) !important; }
    .theme-wed { background: var(--theme-wed) !important; }
    .theme-thu { background: var(--theme-thu) !important; }
    .theme-fri { background: var(--theme-fri) !important; }
    .theme-sat { background: var(--theme-sat) !important; }
    .theme-sun { background: var(--theme-sun) !important; }

    /* 🚀 操作按鈕群組 */
    .action-btn-group { display: flex; gap: 12px; margin-top: 20px; }
    .action-btn-group button {
      flex: 1;
      padding: 18px 14px;
      font-size: 20px; /* 🔤 按鈕字型放大 */
      font-weight: bold;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-submit { background-color: #38a169; color: white; box-shadow: 0 4px 12px rgba(56, 161, 105, 0.3); }
    .btn-submit:hover:not(:disabled) { background-color: #2f855a; transform: translateY(-1px); }
    .btn-submit:disabled { background: #cbd5e0; box-shadow: none; cursor: not-allowed; }

    .btn-cancel-action { background-color: #e53e3e; color: white; box-shadow: 0 4px 12px rgba(229, 62, 62, 0.3); }
    .btn-cancel-action:hover:not(:disabled) { background-color: #c53030; transform: translateY(-1px); }
    .btn-cancel-action:disabled { background: var(--box-bg); color: #a0aec0; box-shadow: none; cursor: not-allowed; border: 1px solid var(--border-color); }

    /* 👤 會員與輸入框區塊 */
    .user-info { 
      background: rgba(66, 153, 225, 0.15); 
      color: var(--text-main); 
      padding: 14px 18px; 
      border-radius: 10px; 
      margin: 18px 0; 
      font-weight: 600; 
      font-size: 16px;
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      word-break: break-all; 
      text-align: left; 
    }
    .btn-logout { 
      background: #e53e3e; 
      color: white; 
      border: none; 
      padding: 8px 16px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 14px; 
      font-weight: bold;
      white-space: nowrap; 
      margin-left: 10px; 
    }
    
    .input-box { margin: 18px 0; text-align: left; }
    .input-box label { display: block; font-weight: 700; margin-bottom: 8px; color: var(--text-main); font-size: 16px; }
    .input-box input { width: 100%; padding: 14px; font-size: 17px; border: 1.5px solid var(--border-color); border-radius: 8px; box-sizing: border-box; background: var(--card-bg); color: var(--text-main); }

    /* 📋 報名名單列表 */
    .attendees-container { 
      margin-top: 20px; 
      background-color: var(--card-bg); 
      border: 1px solid var(--border-color); 
      border-radius: 14px; 
      padding: 18px; 
      text-align: left; 
      animation: fadeIn 0.3s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .attendees-title { 
      margin: 0 0 12px 0; 
      font-size: 17px; 
      color: var(--text-main); 
      font-weight: 700; 
      border-bottom: 2px solid var(--border-color); 
      padding-bottom: 10px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    .attendees-list { max-height: 260px; overflow-y: auto; font-size: 16px; }
    .attendee-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 4px; border-bottom: 1px dashed var(--border-color); }
    .attendee-item:last-child { border-bottom: none; }
    .attendee-name { font-weight: 600; color: var(--text-main); }
    .status-tag { font-size: 14px; padding: 4px 10px; border-radius: 6px; font-weight: 700; }
    .status-tag.success { background-color: #c6f6d5; color: #22543d; }
    .status-tag.waitlist { background-color: #feebc8; color: #744210; }
    .empty-text { color: var(--text-muted); font-size: 15px; font-style: italic; margin: 10px 0; text-align: center; }

    /* 🌐 頁尾 (Footer) */
    footer {
      margin-top: 40px;
      padding: 24px 15px;
      background-color: var(--box-bg);
      border-top: 1px solid var(--border-color);
      border-radius: 16px;
      font-size: 14px;
      color: var(--text-main);
    }
    
    .footer-tools {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    
    .lang-btn, .theme-btn { 
      background: var(--card-bg); 
      border: 1px solid var(--border-color); 
      padding: 8px 14px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 14px; 
      font-weight: 600; 
      color: var(--text-main);
      transition: all 0.2s; 
    }
    .theme-btn:hover, .lang-btn:hover {
      background: var(--border-color);
    }

    .contact-admin-btn { 
      display: inline-flex; 
      align-items: center; 
      gap: 5px; 
      padding: 8px 14px; 
      background-color: #5a7d7c; 
      color: white; 
      text-decoration: none; 
      font-size: 14px; 
      font-weight: 600; 
      border-radius: 8px; 
      transition: background-color 0.2s; 
      cursor: pointer; 
    }
    .contact-admin-btn:hover { background-color: #486564; }

    /* 🛠️ 管理員工具箱 */
    .admin-bar { margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border-color); font-size: 13px; color: var(--text-muted); }
    .admin-btn-group { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
    .btn-admin-action { background: #718096; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: background 0.2s; }
    .btn-admin-action:hover { background: #4a5568; }
    .btn-admin-danger { background-color: #c53030 !important; }
    .btn-admin-danger:hover { background-color: #9b2c2c !important; }
  </style>
</head>
<body>

  <div class="main-wrapper">
    <div class="card">
      
      <div id="main-banner" class="header-banner">
        <h1 id="event-title" data-i18n="appTitle">匹克球團搶位系統</h1>
        <div id="event-date" class="date-sub" data-i18n="selectSessionHint">請點選下方場次卡片進行報名</div>
      </div>

      <div class="status-box" id="status-box-container">
        <span id="status-label" data-i18n="remainingSeatsLabel">剩餘名額：</span>
        <strong id="seats" class="seats-highlight">--</strong>
      </div>

      <div id="auth-box" style="margin-bottom: 20px;">
        <p style="color: var(--text-main); font-size: 16px; font-weight: 600;" data-i18n="googleAuthHint">請先驗證 Google 帳號：</p>
        <div id="g_id_onload"
             data-client_id="329337408769-4omaa4c4877335iv5thus8npk64bjbag.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
      </div>

      <div id="user-profile" class="user-info" style="display: none;">
        <span id="user-profile-text"></span>
        <button class="btn-logout" onclick="logout()" data-i18n="logoutBtn">登出</button>
      </div>

      <div id="non-member-name-box" class="input-box" style="display: none;">
        <label for="custom-name" data-i18n="inputNameLabel">✍️ 請輸入中文大名：</label>
        <input type="text" id="custom-name" placeholder="例如：王小明">
      </div>

      <div id="session-selector" class="session-container">
        <h3 id="session-selector-title" data-i18n="selectSessionTitle">📅 選擇場次：</h3>
        <div id="session-buttons" data-i18n="loading">載入中...</div>
      </div>

      <div class="action-btn-group">
        <button id="btn-grab" class="btn-submit" onclick="startGrab()" disabled data-i18n="btnSelectFirst">請先選擇場次</button>
        <button id="btn-cancel" class="btn-cancel-action" onclick="startCancel()" disabled data-i18n="btnCancel">取消報名</button>
      </div>

      <div id="attendees-section" class="attendees-container" style="display: none;">
        <div class="attendees-title">
          <span id="attendees-title-text" data-i18n="attendeeListTitle">📋 報名名單</span>
          <span style="font-size: 14px; color: var(--text-muted); font-weight: normal;" data-i18n="realtimeUpdate">(即時更新)</span>
        </div>
        <div class="attendees-list" id="attendees-list">
          <p class="empty-text" data-i18n="clickSessionToLoad">請點擊上方場次以載入名單</p>
        </div>
      </div>

      <div class="notice-card" id="notice-card" style="margin-top: 25px;">
        <div class="notice-header" onclick="toggleNotice()">
          <span data-i18n="noticeTitle">💡 報名溫馨提醒</span>
          <span class="arrow-icon">▼</span>
        </div>
        <div class="notice-content" id="notice-content">
          <span data-i18n="noticeContent">
            1. 會員開放時間為球敘前一天 <strong>18:00</strong>；非會員開放時間為 <strong>22:00</strong>。<br>
            2. 搶位時若剛好跨過開放秒數，可按 <strong>重新整理</strong> 取得最新狀態。<br>
            3. 當天 <strong>18:00</strong> 後停止報名與取消報名。<br>
            4. 非會員報名時請務必填寫中文真實大名以利核對。
          </span>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <div class="footer-tools">
      <button id="btn-lang-toggle" onclick="toggleLanguage()" class="lang-btn">🌐 中文 / English</button>
      
      <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">🌙 深色</button>

      <a href="#" onclick="openContactAdmin(event)" class="contact-admin-btn" data-i18n="contactAdmin">
        ✉️ 聯絡管理員
      </a>
    </div>

    <div class="admin-bar">
      <span data-i18n="adminToolsTitle">🛠️ 管理員工具箱：</span>
      <div class="admin-btn-group">
        <button class="btn-admin-action" onclick="adminTogglePause()" data-i18n="adminPause">⏸️ 切換暫停/開放</button>
        <button class="btn-admin-action" onclick="adminAddUser()" data-i18n="adminAdd">➕ 手動新增球友</button>
        <button class="btn-admin-action" onclick="adminRemoveUser()" data-i18n="adminRemove">❌ 手動刪除球友</button>
        <button class="btn-admin-action" onclick="adminReorderUser()" data-i18n="adminReorder">↕️ 調整球友順序</button>
        <button class="btn-admin-action" onclick="triggerAdminSync()" data-i18n="adminSync">🔄 強制同步試算表</button>
        <button class="btn-admin-action btn-admin-danger" onclick="adminManageBlacklist()" data-i18n="adminBlacklistManage">🚫 黑名單管理</button>
      </div>
    </div>
  </footer>

  <script>
    let selectedSession = null;
    let userToken = null;
    let pollInterval = null;
    let isCurrentUserMember = false;
    let currentLang = localStorage.getItem('app_lang') || 'zh';

    // 💡 溫馨提醒卡片伸縮開關
    function toggleNotice() {
      const card = document.getElementById('notice-card');
      card.classList.toggle('open');
    }

    // 🌙 深淺主題切換邏輯
    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('app_theme', isDark ? 'dark' : 'light');
      document.getElementById('theme-btn').innerText = isDark ? '☀️ 亮色' : '🌙 深色';
    }

    // 初始化主題
    if (localStorage.getItem('app_theme') === 'dark') {
      document.body.classList.add('dark-mode');
      document.getElementById('theme-btn').innerText = '☀️ 亮色';
    }

    // 📧 聯絡管理員
    function openContactAdmin(e) {
      e.preventDefault();
      const email = "easternstarpickleball@gmail.com";
      const subject = "【匹克球報名系統】問題反應與諮詢";
      
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

      if (isMobile) {
        window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}`;
      } else {
        const gmailWebUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${email}&su=${encodeURIComponent(subject)}`;
        window.open(gmailWebUrl, '_blank');
      }
    }

    // 🌐 雙語字典檔
    const i18n = {

        adminAdd: "➕ Add Player",
        adminRemove: "❌ Remove Player",
        adminReorder: "↕️ Reorder Player",
        adminSync: "🔄 Force Sync Sheet",
        adminBlacklistManage: "🚫 Blacklist Mgmt",
        seatsCount: " Left",
        waitlistRank: "No. {num}",
        memberTag: " (Member)",
        nonMemberTag: " (Guest)"
      }
    };

    // 🌐 單一按鈕切換語言功能
    function toggleLanguage() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      localStorage.setItem('app_lang', currentLang);
      applyLanguage();
    }

    function applyLanguage() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[currentLang][key]) {
          el.innerHTML = i18n[currentLang][key];
        }
      });

      if (selectedSession) {
        selectSession(selectedSession);
      } else {
        loadSessions();
      }
    }

    function getTodayDateStr() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    window.onload = function() {
      applyLanguage();
      const savedToken = localStorage.getItem('pickleball_token');
      if (savedToken) {
        try {
          const payload = parseJwt(savedToken);
          if (payload && payload.exp * 1000 > Date.now() + 10000) {
            userToken = savedToken;
            showLoggedInState(payload.name, payload.email);
            loadSessions();
            startPolling();
          } else {
            localStorage.removeItem('pickleball_token');
            userToken = null;
            loadSessions();
          }
        } catch (e) {
          localStorage.removeItem('pickleball_token');
          userToken = null;
          loadSessions();
        }
      } else {
        loadSessions();
      }
    };

    function handleCredentialResponse(response) {
      userToken = response.credential;
      localStorage.setItem('pickleball_token', userToken);
      const responsePayload = parseJwt(userToken);
      showLoggedInState(responsePayload.name, responsePayload.email);
      loadSessions();
      startPolling();
    }

    function showLoggedInState(name, email) {
      document.getElementById('auth-box').style.display = 'none';
      const profileBox = document.getElementById('user-profile');
      profileBox.style.display = 'flex';
      document.getElementById('user-profile-text').innerText = `👤 ${name} (${email})`;
    }

    function logout() {
      localStorage.removeItem('pickleball_token');
      location.reload();
    }

    function startPolling() {
      if (!pollInterval) pollInterval = setInterval(loadSessions, 5000);
    }

    function parseJwt(token) {
      try {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
      } catch (e) { return null; }
    }

    function getDayPrefix(session) {
      const str = (session.name + " " + session.displayDate);
      if (str.includes("一") || str.includes("Mon")) return "mon";
      if (str.includes("二") || str.includes("Tue")) return "tue";
      if (str.includes("三") || str.includes("Wed")) return "wed";
      if (str.includes("四") || str.includes("Thu")) return "thu";
      if (str.includes("五") || str.includes("Fri")) return "fri";
      if (str.includes("六") || str.includes("Sat")) return "sat";
      if (str.includes("日") || str.includes("天") || str.includes("Sun")) return "sun";
      return "mon";
    }

    function renderAttendees(attendees) {
      const section = document.getElementById('attendees-section');
      const listContainer = document.getElementById('attendees-list');
      const t = i18n[currentLang];

      section.style.display = 'block';

      if (!attendees || attendees.length === 0) {
        listContainer.innerHTML = `<p class="empty-text">${t.emptyAttendees}</p>`;
        return;
      }

      let html = '';
      attendees.forEach((item, index) => {
        const isWaitlist = item.status.includes('候補') || item.status.includes('Waitlist');
        const tagClass = isWaitlist ? 'waitlist' : 'success';
        const memberTag = item.isMember ? t.memberTag : t.nonMemberTag;

        html += `
          <div class="attendee-item">
            <span class="attendee-name">${index + 1}. ${item.name}</span>
            <span class="status-tag ${tagClass}">${item.status}${memberTag}</span>
          </div>
        `;
      });

      listContainer.innerHTML = html;
    }

    async function loadSessions() {
      try {
        const url = userToken ? `/api/sessions?token=${encodeURIComponent(userToken)}` : '/api/sessions';
        const res = await fetch(url);
        const data = await res.json();

        let sessions = [];
        if (Array.isArray(data)) {
          sessions = data;
        } else if (data && Array.isArray(data.sessions)) {
          sessions = data.sessions;
          isCurrentUserMember = data.isMember || false;
        }

        const nameBox = document.getElementById('non-member-name-box');
        if (nameBox) {
          nameBox.style.display = (userToken && !isCurrentUserMember) ? 'block' : 'none';
        }

        const btnContainer = document.getElementById('session-buttons');
        btnContainer.innerHTML = '';

        const todayStr = getTodayDateStr();

        sessions.forEach(s => {
          const prefix = getDayPrefix(s);
          const btn = document.createElement('button');
          const isSelected = selectedSession && selectedSession.id === s.id;
          btn.className = `session-btn theme-${prefix} ${isSelected ? 'selected' : ''}`;
          btn.dataset.id = s.id;
          
          const sessionTitle = (currentLang === 'en' && s.nameEn) ? s.nameEn : s.name;
          const isFutureSession = s.dateStr > todayStr;

          if (!s.isOpen && isFutureSession) {
            btn.disabled = true;
          } else {
            btn.disabled = false;
          }

          let statusText = "";
          if (s.isOpen) {
            if (s.remainingSeats > 0) {
              statusText = currentLang === 'en' 
                ? `Seats Left: ${s.remainingSeats}` 
                : `剩 ${s.remainingSeats} 位`;
            } else {
              statusText = currentLang === 'en' 
                ? `Waitlist Spot: No. ${s.waitlistCount + 1}` 
                : `候補第 ${s.waitlistCount + 1} 位`;
            }
          } else {
            const timeNotice = (currentLang === 'en' && s.openTimeStrEn) ? s.openTimeStrEn : s.openTimeStr;
            statusText = `🔒 ${timeNotice || '尚未開放'}`;
          }

          let userTag = s.isUserRegistered ? (currentLang === 'en' ? ' [Registered]' : ' [已報名]') : '';
          
          // ↵ 日期 (s.displayDate) 後加入 <br> 換行
          btn.innerHTML = `${sessionTitle} (${s.displayDate})<br><span style="font-size: 0.9em; font-weight: normal;">${statusText}${userTag}</span>`;

          btn.onclick = () => selectSession(s);
          btnContainer.appendChild(btn);

          if (isSelected) {
            selectedSession = s; 
            updateSeatsDisplay(s);
            updateActionButtons(s);
            renderAttendees(s.attendees);
          }
        });
      } catch (err) {
        console.error("載入失敗：", err);
        document.getElementById('session-buttons').innerText = '❌ 連線失敗';
      }
    }

    function selectSession(session) {
      selectedSession = session;
      const t = i18n[currentLang];
      const sessionTitle = (currentLang === 'en' && session.nameEn) ? session.nameEn : session.name;

      const titleElem = document.getElementById('session-selector-title');
      titleElem.innerText = `${t.selectSessionTitle} ${sessionTitle} (${session.displayDate})`;

      const buttons = document.querySelectorAll('.session-btn');
      buttons.forEach(btn => {
        if (btn.dataset.id === session.id) {
          btn.classList.add('selected');
        } else {
          btn.classList.remove('selected');
        }
      });

      updateSeatsDisplay(session);
      updateActionButtons(session);

      document.getElementById('attendees-title-text').innerText = `📋 ${sessionTitle}`;
      renderAttendees(session.attendees);
    }

    function updateActionButtons(session) {
      const grabBtn = document.getElementById('btn-grab');
      const cancelBtn = document.getElementById('btn-cancel');
      const t = i18n[currentLang];

      const now = new Date();
      const todayStr = getTodayDateStr();
      const currentHour = now.getHours();

      const isPast = session.dateStr < todayStr;
      const isToday = session.dateStr === todayStr;
      const isClosedAfter18 = isToday && currentHour >= 18;

      if (isPast || isClosedAfter18) {
        grabBtn.disabled = true;
        grabBtn.innerText = currentLang === 'en' ? '⏰ Signup Closed (After 18:00)' : '⏰ 報名已截止 (18:00後)';

        cancelBtn.disabled = true;
        cancelBtn.innerText = currentLang === 'en' ? '⏰ Cancel Closed (After 18:00)' : '⏰ 禁止取消 (18:00後)';
        return;
      }

      if (session.isUserRegistered) {
        grabBtn.disabled = true;
        grabBtn.innerText = t.btnCompleted;
      } else {
        grabBtn.disabled = false;
        grabBtn.innerText = session.remainingSeats > 0 ? t.btnGrabMain : t.btnGrabWaitlist;
      }

      if (session.isUserRegistered) {
        cancelBtn.disabled = false;
        cancelBtn.innerText = `❌ ${t.btnCancel}`;
      } else {
        cancelBtn.disabled = true;
        cancelBtn.innerText = t.btnCancel;
      }
    }

    function updateSeatsDisplay(session) {
      const labelElem = document.getElementById('status-label');
      const seatsElem = document.getElementById('seats');
      const t = i18n[currentLang];

      if (session.remainingSeats > 0) {
        labelElem.innerText = t.remainingSeatsLabel;
        seatsElem.innerText = `${session.remainingSeats} ${t.seatsCount}`;
      } else {
        labelElem.innerText = t.waitlistLabel;
        seatsElem.innerText = t.waitlistRank.replace('{num}', session.waitlistCount + 1);
      }
    }

    async function startGrab() {
      if (!selectedSession || !userToken) {
        alert(currentLang === 'en' ? "Please login with Google first!" : "請先登入 Google 帳號！");
        return;
      }

      const now = new Date();
      const todayStr = getTodayDateStr();
      if (selectedSession.dateStr < todayStr || (selectedSession.dateStr === todayStr && now.getHours() >= 18)) {
        alert(currentLang === 'en' ? "Signups are closed after 18:00 on session day!" : "當天 18:00 後已截止報名！");
        return;
      }

      let customNameVal = '';
      if (!isCurrentUserMember) {
        customNameVal = document.getElementById('custom-name').value.trim();
        if (!customNameVal) {
          alert(currentLang === 'en' ? "Please enter your Full Name!" : '請輸入您的「中文大名」！');
          document.getElementById('custom-name').focus();
          return;
        }
      }

      const grabBtn = document.getElementById('btn-grab');
      grabBtn.disabled = true;

      try {
        const res = await fetch('/api/grab', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sessionId: selectedSession.id,
            token: userToken,
            customName: customNameVal
          })
        });

        const result = await res.json();
        alert(result.message);

        if (result.success) {
          loadSessions();
        } else {
          grabBtn.disabled = false;
        }
      } catch (err) {
        alert('❌ 送出失敗，請確認網路連線。');
        grabBtn.disabled = false;
      }
    }

    async function startCancel() {
      if (!selectedSession || !userToken) return;

      const now = new Date();
      const todayStr = getTodayDateStr();
      if (selectedSession.dateStr < todayStr || (selectedSession.dateStr === todayStr && now.getHours() >= 18)) {
        alert(currentLang === 'en' ? "Cancellations are not allowed after 18:00 on session day!" : "當天 18:00 後已禁止取消報名！");
        return;
      }

      const title = (currentLang === 'en' && selectedSession.nameEn) ? selectedSession.nameEn : selectedSession.name;
      if (!confirm(`確定要取消【${title}】的報名嗎？`)) return;

      const cancelBtn = document.getElementById('btn-cancel');
      cancelBtn.disabled = true;

      try {
        const res = await fetch('/api/cancel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sessionId: selectedSession.id,
            token: userToken
          })
        });

        const result = await res.json();
        alert(result.message);

        if (result.success) {
          loadSessions();
        } else {
          cancelBtn.disabled = false;
        }
      } catch (err) {
        alert('❌ 取消失敗，請確認網路連線。');
        cancelBtn.disabled = false;
      }
    }

    // --- 🛠️ 管理員功能 ---
    async function adminTogglePause() {
      const secret = prompt("請輸入管理員密碼：");
      if (!secret) return;

      try {
        const res = await fetch('/api/admin/toggle-pause', {
          method: 'POST',
          headers: { 'x-admin-secret': secret }
        });
        const data = await res.json();
        alert(data.message);
      } catch (e) {
        alert("❌ 操作失敗，請檢查伺服器連線。");
      }
    }

    async function adminAddUser() {
      if (!selectedSession) return alert("請先選擇場次！");
      const secret = prompt("請輸入管理員密碼：");
      if (!secret) return;

      const name = prompt("請輸入球友姓名：");
      const email = prompt("請輸入球友 Email：");
      if (!name || !email) return alert("姓名與 Email 皆為必填！");

      try {
        const res = await fetch('/api/admin/add-user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
          body: JSON.stringify({ sessionId: selectedSession.id, name, email })
        });
        const data = await res.json();
        alert(data.message);
        if (data.success) loadSessions();
      } catch (e) {
        alert("❌ 新增失敗！");
      }
    }

    async function adminRemoveUser() {
      if (!selectedSession) return alert("請先選擇場次！");
      const secret = prompt("請輸入管理員密碼：");
      if (!secret) return;

      const email = prompt("請輸入要刪除的 Email：");
      if (!email) return;

      try {
        const res = await fetch('/api/admin/remove-user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
          body: JSON.stringify({ sessionId: selectedSession.id, email })
        });
        const data = await res.json();
        alert(data.message);
        if (data.success) loadSessions();
      } catch (e) {
        alert("❌ 刪除失敗！");
      }
    }

    async function adminReorderUser() {
      if (!selectedSession) return alert("請先選擇場次！");
      const secret = prompt("請輸入管理員密碼：");
      if (!secret) return;

      const email = prompt("請輸入球友 Email：");
      if (!email) return;

      const newPosition = prompt("請輸入目標位置（如：1）：");
      if (!newPosition) return;

      try {
        const res = await fetch('/api/admin/reorder-user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
          body: JSON.stringify({ sessionId: selectedSession.id, email, newPosition })
        });
        const data = await res.json();
        alert(data.message);
        if (data.success) loadSessions();
      } catch (e) {
        alert("❌ 調整失敗！");
      }
    }

    async function triggerAdminSync() {
      const secret = prompt("請輸入管理員密碼：");
      if (!secret) return;

      try {
        const res = await fetch('/api/admin/sync', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret }
        });
        const result = await res.json();
        alert(result.message);
        if (result.success) loadSessions();
      } catch (e) {
        alert("❌ 同步失敗！");
      }
    }

    // 🚫 濃縮黑名單管理（合二為一）
    async function adminManageBlacklist() {
      const secret = prompt("請輸入管理員密碼：");
      if (!secret) return;

      const action = prompt("請選擇操作類型：\n輸入【1】新增黑名單\n輸入【2】解除/移除黑名單");
      if (!action) return;

      if (action.trim() === '1') {
        const target = prompt("請輸入要加入黑名單的「球友姓名」或「Email」：");
        if (!target || !target.trim()) return alert("❌ 輸入不能為空白！");

        try {
          const res = await fetch('/api/admin/add-blacklist', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
            body: JSON.stringify({ target: target.trim() })
          });
          const data = await res.json();
          alert(data.message);
          if (data.success && typeof loadSessions === 'function') loadSessions();
        } catch (e) {
          console.error("❌ 操作失敗：", e);
          alert("❌ 操作失敗，請檢查網路連線。");
        }

      } else if (action.trim() === '2') {
        const target = prompt("請輸入要解除黑名單的「球友姓名」或「Email」：");
        if (!target || !target.trim()) return alert("❌ 輸入不能為空白！");

        try {
          const res = await fetch('/api/admin/remove-blacklist', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
            body: JSON.stringify({ target: target.trim(), email: target.trim(), name: target.trim() })
          });
          const data = await res.json();
          alert(data.message);
          if (data.success && typeof loadSessions === 'function') loadSessions();
        } catch (e) {
          console.error("❌ 操作失敗：", e);
          alert("❌ 操作失敗，請檢查網路連線。");
        }
      } else {
        alert("❌ 無效選項，請輸入 1 或 2！");
      }
    }
  </script>
