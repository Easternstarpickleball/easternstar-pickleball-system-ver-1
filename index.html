<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>匹克球團搶位系統</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f0f2f5; padding: 20px; text-align: center; }
    .card { background: white; max-width: 450px; margin: 20px auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h1 { font-size: 26px; margin-bottom: 10px; transition: color 0.3s; }
    .date-title { color: #555; font-size: 18px; margin-bottom: 20px; font-weight: bold; }
    .status-box { background-color: #e8f5e9; color: #1b5e20; padding: 15px; border-radius: 8px; font-size: 18px; margin-bottom: 20px; }
    .session-container { margin: 15px 0; padding: 15px; background: #fdfdfd; border: 1px dashed #ccc; border-radius: 10px; }
    
    .session-btn { display: block; width: 100%; margin: 8px 0; padding: 12px; font-size: 16px; border-radius: 8px; cursor: pointer; color: white; border: none; font-weight: bold; transition: background 0.2s; }
    
    .session-btn:disabled { 
      background: #ccc !important; 
      color: #ffffff !important; 
      cursor: not-allowed; 
      opacity: 0.7; 
    }

    .btn-cancel {
      background-color: #dc3545 !important;
      color: white !important;
      margin-bottom: 15px;
    }
    .btn-cancel:hover { background-color: #bd2130 !important; }
    
    /* 🎨 主題顏色 */
    .color-mon, .day-mon { color: #6f42c1; }
    .day-mon { background-color: #6f42c1; color: white; }
    .day-mon:hover:not(:disabled) { background-color: #59359a; }

    .color-tue, .day-tue { color: #007bff; }
    .day-tue { background-color: #007bff; color: white; }
    .day-tue:hover:not(:disabled) { background-color: #0056b3; }

    .color-wed, .day-wed { color: #d4ac0d; }
    .day-wed { background-color: #f1c40f; color: #333; }
    .day-wed:hover:not(:disabled) { background-color: #d4ac0d; }

    .color-thu, .day-thu { color: #28a745; }
    .day-thu { background-color: #28a745; color: white; }
    .day-thu:hover:not(:disabled) { background-color: #1e7e34; }

    .color-fri, .day-fri { color: #e83e8c; }
    .day-fri { background-color: #e83e8c; color: white; }
    .day-fri:hover:not(:disabled) { background-color: #c2185b; }

    .color-sat, .day-sat { color: #fd7e14; }
    .day-sat { background-color: #fd7e14; color: white; }
    .day-sat:hover:not(:disabled) { background-color: #d96302; }

    .color-sun, .day-sun { color: #3315c6; }
    .day-sun { background-color: #3315c6; color: white; }
    .day-sun:hover:not(:disabled) { background-color: #1b1093; }

    .color-default, .day-default { color: #2e7d32; }
    .day-default { background-color: #6c757d; color: white; }
    .day-default:hover:not(:disabled) { background-color: #545b62; }

    .btn-submit { background-color: #ff4757; color: white; border: none; padding: 15px 30px; font-size: 22px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; box-shadow: 0 4px 10px rgba(255, 71, 87, 0.4); margin-top: 15px; }
    .btn-submit:disabled { background: #b2bec3; box-shadow: none; cursor: not-allowed; }
    .user-info { background: #e3f2fd; color: #0d47a1; padding: 10px 15px; border-radius: 8px; margin: 15px 0; font-weight: bold; display: flex; justify-content: space-between; align-items: center; word-break: break-all; text-align: left; }
    .btn-logout { background: #ff7675; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; white-space: nowrap; margin-left: 10px; }
    
    .input-box { margin: 15px 0; text-align: left; }
    .input-box label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
    .input-box input { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
  </style>
</head>
<body>

  <div class="card">
    <h1 id="event-title" class="color-default">匹克球團秒搶報名</h1>
    <div class="date-title">請選擇下方場次</div>

    <div class="status-box" id="status-box-container">
      <span id="status-label">剩餘名額：</span><strong id="seats" style="font-size: 28px; color: #d63031;">--</strong>
    </div>

    <div id="auth-box" style="margin-bottom: 20px;">
      <p style="color: #666; font-size: 14px;">請先驗證 Google 帳號：</p>
      <div id="g_id_onload"
         data-client_id="329337408769-4omaa4c4877335iv5thus8npk64bjbag.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
      </div>
      <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="user-profile" class="user-info" style="display: none;">
      <span id="user-profile-text"></span>
      <button class="btn-logout" onclick="logout()">登出</button>
    </div>

    <div id="non-member-name-box" class="input-box" style="display: none;">
      <label for="custom-name">✍️ 請輸入中文大名：</label>
      <input type="text" id="custom-name" placeholder="例如：王小明">
    </div>

    <div id="session-selector" class="session-container">
      <h3 style="margin-top:0; color:#333;">📅 場次清單：</h3>
      <div id="session-buttons">載入中...</div>
    </div>

    <button id="btn-grab" class="btn-submit" onclick="startGrab()" disabled>請先選擇場次</button>
  </div>

  <script>
    let selectedSession = null;
    let userToken = null;
    let pollInterval = null;
    let isCurrentUserMember = false;

    window.onload = function() {
      const savedToken = localStorage.getItem('pickleball_token');
      if (savedToken) {
        try {
          const payload = parseJwt(savedToken);
          if (payload.exp * 1000 > Date.now()) {
            userToken = savedToken;
            showLoggedInState(payload.name, payload.email);
            loadSessions();
            startPolling();
          } else {
            localStorage.removeItem('pickleball_token');
            loadSessions();
          }
        } catch (e) {
          localStorage.removeItem('pickleball_token');
          loadSessions();
        }
      } else {
        loadSessions();
      }
    };

    function handleCredentialResponse(response) {
      userToken = response.credential;
      localStorage.setItem('pickleball_token', userToken);
      
      const responsePayload = parseJwt(userToken);
      showLoggedInState(responsePayload.name, responsePayload.email);
      loadSessions();
      startPolling();
    }

    function showLoggedInState(name, email) {
      document.getElementById('auth-box').style.display = 'none';
      const profileBox = document.getElementById('user-profile');
      profileBox.style.display = 'flex';
      document.getElementById('user-profile-text').innerText = `👤 ${name} (${email})`;
    }

    function logout() {
      localStorage.removeItem('pickleball_token');
      location.reload();
    }

    function startPolling() {
      if (!pollInterval) {
        pollInterval = setInterval(loadSessions, 3000);
      }
    }

    function parseJwt(token) {
      var base64Url = token.split('.')[1];
      var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
    }

    function getDayPrefix(session) {
      const str = (session.name + " " + session.displayDate);
      if (str.includes("一") || str.includes("Mon")) return "mon";
      if (str.includes("二") || str.includes("Tue")) return "tue";
      if (str.includes("三") || str.includes("Wed")) return "wed";
      if (str.includes("四") || str.includes("Thu")) return "thu";
      if (str.includes("五") || str.includes("Fri")) return "fri";
      if (str.includes("六") || str.includes("Sat")) return "sat";
      if (str.includes("日") || str.includes("天") || str.includes("Sun")) return "sun";
      return "default";
    }

    async function loadSessions() {
      try {
        const url = userToken ? `/api/sessions?token=${encodeURIComponent(userToken)}` : '/api/sessions';
        const res = await fetch(url);
        const data = await res.json();
        
        // 💡 前後端格式相容處理
        let sessions = [];
        if (Array.isArray(data)) {
          sessions = data;
        } else if (data && Array.isArray(data.sessions)) {
          sessions = data.sessions;
          isCurrentUserMember = data.isMember || false;
        }

        // 💡 控制中文大名輸入框：只在已登入且為「非會員」時顯示
        const nameBox = document.getElementById('non-member-name-box');
        if (nameBox) {
          if (userToken && !isCurrentUserMember) {
            nameBox.style.display = 'block';
          } else {
            nameBox.style.display = 'none';
          }
        }

        const btnContainer = document.getElementById('session-buttons');
        btnContainer.innerHTML = '';

        sessions.forEach(s => {
          const prefix = getDayPrefix(s);
          const btn = document.createElement('button');
          btn.className = `session-btn day-${prefix}`;
          
          if (s.isOpen) {
            if (s.remainingSeats > 0) {
              btn.innerText = `${s.name} (${s.displayDate}) - 剩餘 ${s.remainingSeats} 位`;
            } else {
              btn.innerText = `${s.name} (${s.displayDate}) - 候補第 ${s.waitlistCount + 1} 位`;
            }
            btn.onclick = () => selectSession(s);
          } else {
            btn.innerText = `🔒 ${s.name} (${s.displayDate}) - ${s.openTimeStr}`;
            btn.disabled = true;
          }
          btnContainer.appendChild(btn);

          if (s.isUserRegistered) {
            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'session-btn btn-cancel';
            cancelBtn.innerText = `❌ 取消報名：${s.name} (${s.displayDate})`;
            cancelBtn.onclick = () => cancelGrab(s.id);
            btnContainer.appendChild(cancelBtn);
          }

          if (selectedSession && selectedSession.id === s.id) {
            updateSeatsDisplay(s);
          }
        });
      } catch (err) {
        console.error("載入失敗：", err);
        document.getElementById('session-buttons').innerText = '❌ 無法連線至伺服器';
      }
    }

    function selectSession(session) {
      selectedSession = session;
      const titleElem = document.getElementById('event-title');
      const prefix = getDayPrefix(session);

      titleElem.innerText = `${session.name}`;
      titleElem.className = `color-${prefix}`;

      updateSeatsDisplay(session);
      
      const grabBtn = document.getElementById('btn-grab');
      grabBtn.disabled = false;
      
      if (session.remainingSeats > 0) {
        grabBtn.innerText = `🔥 立即搶位 (${session.displayDate})`;
      } else {
        grabBtn.innerText = `⚠️ 搶候補位 (${session.displayDate})`;
      }
    }

    function updateSeatsDisplay(session) {
      const labelElem = document.getElementById('status-label');
      const seatsElem = document.getElementById('seats');

      if (session.remainingSeats > 0) {
        labelElem.innerText = "剩餘名額：";
        seatsElem.innerText = session.remainingSeats;
      } else {
        labelElem.innerText = "候補名額：";
        seatsElem.innerText = `第 ${session.waitlistCount + 1} 位`;
      }
    }

    async function startGrab() {
      if (!selectedSession || !userToken) {
        alert("請先登入 Google 帳號！");
        return;
      }

      let customNameVal = '';
      if (!isCurrentUserMember) {
        customNameVal = document.getElementById('custom-name').value.trim();
        if (!customNameVal) {
          alert('請輸入您的「中文大名」！');
          document.getElementById('custom-name').focus();
          return;
        }
      }

      const grabBtn = document.getElementById('btn-grab');
      grabBtn.disabled = true;

      try {
        const res = await fetch('/api/grab', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sessionId: selectedSession.id,
            token: userToken,
            customName: customNameVal
          })
        });

        const result = await res.json();
        alert(result.message);

        if (result.success) {
          loadSessions();
        } else {
          grabBtn.disabled = false;
        }
      } catch (err) {
        alert('❌ 送出失敗，請確認網路連線。');
        grabBtn.disabled = false;
      }
    }

    async function cancelGrab(sessionId) {
      if (!confirm("確定要取消此場次的報名嗎？")) return;

      try {
        const res = await fetch('/api/cancel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sessionId: sessionId,
            token: userToken
          })
        });

        const result = await res.json();
        alert(result.message);

        if (result.success) {
          loadSessions();
        }
      } catch (err) {
        alert('❌ 取消失敗，請確認網路連線。');
      }
    }
  </script>
</body>
</html>
