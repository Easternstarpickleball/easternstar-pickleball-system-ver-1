<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>еҢ№е…Ӣзҗғеңҳжҗ¶дҪҚзі»зөұ</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f0f2f5; padding: 20px; text-align: center; }
    .card { background: white; max-width: 450px; margin: 20px auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h1 { font-size: 26px; margin-bottom: 10px; transition: color 0.3s; }
    .date-title { color: #555; font-size: 18px; margin-bottom: 20px; font-weight: bold; }
    .status-box { background-color: #e8f5e9; color: #1b5e20; padding: 15px; border-radius: 8px; font-size: 18px; margin-bottom: 20px; }
    .session-container { margin: 15px 0; padding: 15px; background: #fdfdfd; border: 1px dashed #ccc; border-radius: 10px; }
    
    .session-btn { display: block; width: 100%; margin: 10px 0; padding: 12px; font-size: 16px; border-radius: 8px; cursor: pointer; color: white; border: none; font-weight: bold; transition: background 0.2s; }
    .session-btn:disabled { 
    background: #ccc !important; 
    color: #ffffff !important; /* рҹ’Ў еҠ е…ҘйҖҷиЎҢпјҡеј·еҲ¶жүҖжңүйҺ–е®ҡжҢүйҲ•зҡ„еӯ—й«”йғҪи®Ҡзҙ”зҷҪ */
    ursor: not-allowed; 
    opacity: 0.7; 
    }
    
    /* рҹҺЁ ж–Үеӯ—иҲҮжҢүйҲ•йҖҡз”ЁйЎҸиүІе®ҡзҫ© */
    .color-mon, .day-mon { color: #6f42c1; } /* йҖұдёҖпјҡзҙ«иүІ */
    .day-mon { background-color: #6f42c1; color: white; }
    .day-mon:hover:not(:disabled) { background-color: #59359a; }

    .color-tue, .day-tue { color: #007bff; } /* йҖұдәҢпјҡи—ҚиүІ */
    .day-tue { background-color: #007bff; color: white; }
    .day-tue:hover:not(:disabled) { background-color: #0056b3; }

    .color-wed, .day-wed { color: #d4ac0d; } /* йҖұдёүпјҡй»ғиүІ */
    .day-wed { background-color: #f1c40f; color: #333; }
    .day-wed:hover:not(:disabled) { background-color: #d4ac0d; }

    .color-thu, .day-thu { color: #28a745; } /* йҖұеӣӣпјҡз¶ иүІ */
    .day-thu { background-color: #28a745; color: white; }
    .day-thu:hover:not(:disabled) { background-color: #1e7e34; }

    .color-fri, .day-fri { color: #e83e8c; } /* йҖұдә”пјҡзІүиүІ */
    .day-fri { background-color: #e83e8c; color: white; }
    .day-fri:hover:not(:disabled) { background-color: #c2185b; }

    .color-sat, .day-sat { color: #fd7e14; } /* йҖұе…ӯпјҡж©ҳиүІ */
    .day-sat { background-color: #fd7e14; color: white; }
    .day-sat:hover:not(:disabled) { background-color: #d96302; }

    .color-sun, .day-sun { color: #dc3545; } /* йҖұж—Ҙпјҡзҙ…иүІ */
    .day-sun { background-color: #dc3545; color: white; }
    .day-sun:hover:not(:disabled) { background-color: #bd2130; }

    .color-default, .day-default { color: #2e7d32; } /* й җиЁӯпјҡж·ұз¶ иүІ */
    .day-default { background-color: #6c757d; color: white; }
    .day-default:hover:not(:disabled) { background-color: #545b62; }

    .btn-submit { background-color: #ff4757; color: white; border: none; padding: 15px 30px; font-size: 22px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; box-shadow: 0 4px 10px rgba(255, 71, 87, 0.4); margin-top: 15px; }
    .btn-submit:disabled { background: #b2bec3; box-shadow: none; cursor: not-allowed; }
    .user-info { background: #e3f2fd; color: #0d47a1; padding: 10px; border-radius: 8px; margin: 15px 0; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
    .btn-logout { background: #ff7675; color: white; border: none; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 12px; }
  </style>
</head>
<body>

  <div class="card">
    <h1 id="event-title" class="color-default">еҢ№е…Ӣзҗғеңҳз§’жҗ¶е ұеҗҚ</h1>
    <div class="date-title">и«ӢйҒёж“ҮдёӢж–№е ҙж¬Ў</div>

    <div class="status-box" id="status-box-container">
      <span id="status-label">еү©йӨҳеҗҚйЎҚпјҡ</span><strong id="seats" style="font-size: 28px; color: #d63031;">--</strong>
    </div>

    <div id="auth-box" style="margin-bottom: 20px;">
      <p style="color: #666; font-size: 14px;">и«Ӣе…Ҳй©—иӯү Google еёіиҷҹпјҡ</p>
      <div id="g_id_onload"
         data-client_id="329337408769-4omaa4c4877335iv5thus8npk64bjbag.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
      </div>
      <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="user-profile" class="user-info" style="display: none;">
      <span id="user-profile-text"></span>
      <button class="btn-logout" onclick="logout()">зҷ»еҮә</button>
    </div>

    <div id="session-selector" class="session-container">
      <h3 style="margin-top:0; color:#333;">рҹ“… е ҙж¬Ўжё…е–®пјҡ</h3>
      <div id="session-buttons">и«Ӣе…Ҳзҷ»е…Ҙ Google еёіиҷҹ...</div>
    </div>

    <button id="btn-grab" class="btn-submit" onclick="startGrab()" disabled>и«Ӣе…ҲйҒёж“Үе ҙж¬Ў</button>
  </div>

  <script>
    let selectedSession = null;
    let userToken = null;
    let pollInterval = null;

    window.onload = function() {
      const savedToken = localStorage.getItem('pickleball_token');
      if (savedToken) {
        try {
          const payload = parseJwt(savedToken);
          if (payload.exp * 1000 > Date.now()) {
            userToken = savedToken;
            showLoggedInState(payload.name, payload.email);
            loadSessions();
            startPolling();
          } else {
            localStorage.removeItem('pickleball_token');
          }
        } catch (e) {
          localStorage.removeItem('pickleball_token');
        }
      }
    };

    function handleCredentialResponse(response) {
      userToken = response.credential;
      localStorage.setItem('pickleball_token', userToken);
      
      const responsePayload = parseJwt(userToken);
      showLoggedInState(responsePayload.name, responsePayload.email);
      loadSessions();
      startPolling();
    }

    function showLoggedInState(name, email) {
      document.getElementById('auth-box').style.display = 'none';
      const profileBox = document.getElementById('user-profile');
      profileBox.style.display = 'flex';
      document.getElementById('user-profile-text').innerText = `рҹ‘Ө ${name} (${email})`;
    }

    function logout() {
      localStorage.removeItem('pickleball_token');
      location.reload();
    }

    function startPolling() {
      if (!pollInterval) {
        pollInterval = setInterval(loadSessions, 3000);
      }
    }

    function parseJwt(token) {
      var base64Url = token.split('.')[1];
      var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
    }

    // рҹҺЁ еҲӨе®ҡжҳҹжңҹзҡ„еүҚз¶ҙеӯ— (mon, tue, wed, thu, fri, sat, sun)
    function getDayPrefix(session) {
      const str = (session.name + " " + session.displayDate);
      if (str.includes("дёҖ") || str.includes("Mon")) return "mon";
      if (str.includes("дәҢ") || str.includes("Tue")) return "tue";
      if (str.includes("дёү") || str.includes("Wed")) return "wed";
      if (str.includes("еӣӣ") || str.includes("Thu")) return "thu";
      if (str.includes("дә”") || str.includes("Fri")) return "fri";
      if (str.includes("е…ӯ") || str.includes("Sat")) return "sat";
      if (str.includes("ж—Ҙ") || str.includes("еӨ©") || str.includes("Sun")) return "sun";
      return "default";
    }

    async function loadSessions() {
      try {
        const url = userToken ? `/api/sessions?token=${encodeURIComponent(userToken)}` : '/api/sessions';
        const res = await fetch(url);
        const sessions = await res.json();
        
        const btnContainer = document.getElementById('session-buttons');
        btnContainer.innerHTML = '';

        sessions.forEach(s => {
          const btn = document.createElement('button');
          const prefix = getDayPrefix(s);
          btn.className = `session-btn day-${prefix}`;
          
          if (s.isOpen) {
            // жҢүйҲ•ж–Үеӯ—йЎҜзӨәйӮҸијҜ
            if (s.remainingSeats > 0) {
              btn.innerText = `${s.name} (${s.displayDate}) - еү©йӨҳ ${s.remainingSeats} дҪҚ`;
            } else {
              btn.innerText = `${s.name} (${s.displayDate}) - еҖҷиЈңз¬¬ ${s.waitlistCount + 1} дҪҚ`;
            }
            btn.onclick = () => selectSession(s);
          } else {
            btn.innerText = `рҹ”’ ${s.name} (${s.displayDate}) - ${s.openTimeStr} й–Ӣж”ҫ`;
            btn.disabled = true;
          }
          btnContainer.appendChild(btn);

          // иӢҘзӣ®еүҚе·Ій»һйҒёи©Іе ҙж¬ЎпјҢеҗҢжӯҘжӣҙж–°еҗҚйЎҚ/еҖҷиЈңйЎҜзӨә
          if (selectedSession && selectedSession.id === s.id) {
            updateSeatsDisplay(s);
          }
        });
      } catch (err) {
        document.getElementById('session-buttons').innerText = 'вқҢ з„Ўжі•йҖЈз·ҡиҮідјәжңҚеҷЁ';
      }
    }

    function selectSession(session) {
      selectedSession = session;
      const titleElem = document.getElementById('event-title');
      const prefix = getDayPrefix(session);

      // 1. иЁӯе®ҡдё»жЁҷйЎҢеҗҚзЁұиҲҮе°ҚжҮүйЎҸиүІ Class
      titleElem.innerText = `${session.name}`;
      titleElem.className = `color-${prefix}`;

      // 2. жӣҙж–°еҗҚйЎҚжҲ–еҖҷиЈңйЎҜзӨә
      updateSeatsDisplay(session);
      
      const grabBtn = document.getElementById('btn-grab');
      grabBtn.disabled = false;
      
      if (session.remainingSeats > 0) {
        grabBtn.innerText = `рҹ”Ҙ з«ӢеҚіжҗ¶дҪҚ (${session.displayDate})`;
      } else {
        grabBtn.innerText = `вҡ пёҸ жҗ¶еҖҷиЈңдҪҚ (${session.displayDate})`;
      }
    }

    // рҹ’Ў зҚЁз«Ӣзҡ„еҗҚйЎҚ/еҖҷиЈңйЎҜзӨәжӣҙж–°еҮҪејҸ
    function updateSeatsDisplay(session) {
      const labelElem = document.getElementById('status-label');
      const seatsElem = document.getElementById('seats');

      if (session.remainingSeats > 0) {
        // жӯЈеҸ–йҡҺж®өпјҡеҫһ 36 еҫҖдёӢжүЈ
        labelElem.innerText = "еү©йӨҳеҗҚйЎҚпјҡ";
        seatsElem.innerText = session.remainingSeats;
      } else {
        // еҖҷиЈңйҡҺж®өпјҡеҫһ 1 й–Ӣе§ӢеҫҖдёҠеҠ 
        labelElem.innerText = "еҖҷиЈңеҗҚйЎҚпјҡ";
        seatsElem.innerText = `з¬¬ ${session.waitlistCount + 1} дҪҚ`;
      }
    }

    async function startGrab() {
      if (!selectedSession || !userToken) {
        alert("и«Ӣе…Ҳзҷ»е…Ҙ Google еёіиҷҹпјҒ");
        return;
      }

      const grabBtn = document.getElementById('btn-grab');
      grabBtn.disabled = true;

      try {
        const res = await fetch('/api/grab', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sessionId: selectedSession.id,
            token: userToken
          })
        });

        const result = await res.json();
        alert(result.message);

        if (result.success) {
          loadSessions();
        } else {
          grabBtn.disabled = false;
        }
      } catch (err) {
        alert('вқҢ йҖҒеҮәеӨұж•—пјҢи«ӢзўәиӘҚз¶Іи·ҜйҖЈз·ҡгҖӮ');
        grabBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
