<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="appTitle">匹克球團搶位系統</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* 🎨 莫蘭迪柔和色彩與大字體優化 */
    :root {
      --bg-main: #f4f6f8;
      --card-bg: #ffffff;
      --text-main: #2c3e50;
      --text-muted: #7f8c8d;
      
      /* 莫蘭迪風格主題色 */
      --theme-mon: linear-gradient(135deg, #7f8c8d, #95a5a6);
      --theme-tue: linear-gradient(135deg, #708090, #536270);
      --theme-wed: linear-gradient(135deg, #d69e2e, #b7791f);
      --theme-thu: linear-gradient(135deg, #8fbc8f, #6b8e23);
      --theme-fri: linear-gradient(135deg, #d8a48f, #bc7d63);
      --theme-sat: linear-gradient(135deg, #e6b89c, #cd853f);
      --theme-sun: linear-gradient(135deg, #805ad5, #6b46c1);
      --theme-default: linear-gradient(135deg, #708090, #4a5568);
    }

    body { 
      font-family: 'PingFang TC', 'Microsoft JhengHei', Arial, sans-serif; 
      background-color: var(--bg-main); 
      color: var(--text-main);
      padding: 15px; 
      margin: 0;
      text-align: center; 
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .main-wrapper {
      flex: 1;
    }

    .card { 
      background: var(--card-bg); 
      max-width: 500px; 
      margin: 10px auto; 
      padding: 24px; 
      border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.06); 
      transition: all 0.3s ease; 
    }

    /* 📌 頂部 Banner */
    .header-banner {
      padding: 20px;
      border-radius: 16px;
      background: var(--theme-default);
      color: white;
      margin-bottom: 20px;
      transition: all 0.4s ease;
      box-shadow: 0 6px 16px rgba(0,0,0,0.1);
    }
    .header-banner h1 { font-size: 26px; margin: 0 0 8px 0; font-weight: 700; letter-spacing: 0.5px; }
    .header-banner .date-sub { font-size: 16px; opacity: 0.95; }

    /* 💡 溫馨提醒卡片 */
    .notice-card {
      background-color: #fffaf0;
      border-left: 4px solid #dd6b20;
      padding: 14px 18px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.6;
      color: #744210;
      text-align: left;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    }
    .notice-card h3 { font-size: 15px; margin: 0 0 6px 0; display: flex; align-items: center; gap: 6px; }

    /* 📊 狀態欄與資訊卡片 */
    .status-box { 
      background-color: #f8fafc; 
      color: var(--text-main); 
      padding: 16px; 
      border-radius: 12px; 
      font-size: 18px; 
      font-weight: 600;
      margin-bottom: 20px; 
      border: 1px solid #e2e8f0; 
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }
    .seats-highlight { font-size: 30px; color: #e53e3e; font-weight: 800; }

    .session-container { 
      margin: 20px 0; 
      padding: 18px; 
      background: #f8fafc; 
      border: 1.5px dashed #cbd5e0; 
      border-radius: 16px; 
    }
    
    /* 📅 場次按鈕 */
    .session-btn { 
      display: block; 
      width: 100%; 
      margin: 12px 0; 
      padding: 16px 14px; 
      font-size: 17px; 
      border-radius: 12px; 
      cursor: pointer; 
      color: white; 
      border: 2px solid transparent; 
      font-weight: 700; 
      transition: all 0.25s ease;
      box-sizing: border-box;
      opacity: 0.9;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .session-btn:hover:not(:disabled) { opacity: 1; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
    .session-btn:disabled { background: #e2e8f0 !important; color: #a0aec0 !important; cursor: not-allowed; opacity: 0.7; transform: none; box-shadow: none; }

    .session-btn.selected {
      opacity: 1 !important;
      transform: scale(1.02) !important;
      border: 3px solid #2d3748 !important;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18) !important;
    }

    /* 各天別主題色（套用莫蘭迪色系） */
    .theme-mon { background: var(--theme-mon); }
    .theme-tue { background: var(--theme-tue); }
    .theme-wed { background: var(--theme-wed); }
    .theme-thu { background: var(--theme-thu); }
    .theme-fri { background: var(--theme-fri); }
    .theme-sat { background: var(--theme-sat); }
    .theme-sun { background: var(--theme-sun); }
    .theme-default { background: var(--theme-default); }

    /* 🚀 操作按鈕群組 */
    .action-btn-group { display: flex; gap: 12px; margin-top: 20px; }
    .action-btn-group button {
      flex: 1;
      padding: 16px 12px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-submit { background-color: #38a169; color: white; box-shadow: 0 4px 12px rgba(56, 161, 105, 0.3); }
    .btn-submit:hover:not(:disabled) { background-color: #2f855a; transform: translateY(-1px); }
    .btn-submit:disabled { background: #cbd5e0; box-shadow: none; cursor: not-allowed; }

    .btn-cancel-action { background-color: #e53e3e; color: white; box-shadow: 0 4px 12px rgba(229, 62, 62, 0.3); }
    .btn-cancel-action:hover:not(:disabled) { background-color: #c53030; transform: translateY(-1px); }
    .btn-cancel-action:disabled { background: #edf2f7; color: #a0aec0; box-shadow: none; cursor: not-allowed; }

    /* 👤 會員與輸入框區塊 */
    .user-info { 
      background: #ebf8ff; 
      color: #2b6cb0; 
      padding: 12px 16px; 
      border-radius: 10px; 
      margin: 18px 0; 
      font-weight: 600; 
      font-size: 15px;
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      word-break: break-all; 
      text-align: left; 
    }
    .btn-logout { 
      background: #e53e3e; 
      color: white; 
      border: none; 
      padding: 6px 14px; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 13px; 
      font-weight: bold;
      white-space: nowrap; 
      margin-left: 10px; 
    }
    
    .input-box { margin: 18px 0; text-align: left; }
    .input-box label { display: block; font-weight: 700; margin-bottom: 8px; color: #2d3748; font-size: 15px; }
    .input-box input { width: 100%; padding: 12px; font-size: 16px; border: 1.5px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; }

    /* 📋 報名名單列表 */
    .attendees-container { 
      margin-top: 20px; 
      background-color: #ffffff; 
      border: 1px solid #e2e8f0; 
      border-radius: 14px; 
      padding: 18px; 
      text-align: left; 
      animation: fadeIn 0.3s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .attendees-title { 
      margin: 0 0 12px 0; 
      font-size: 16px; 
      color: #2d3748; 
      font-weight: 700; 
      border-bottom: 2px solid #edf2f7; 
      padding-bottom: 10px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
    }
    .attendees-list { max-height: 240px; overflow-y: auto; font-size: 15px; }
    .attendee-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 4px; border-bottom: 1px dashed #e2e8f0; }
    .attendee-item:last-child { border-bottom: none; }
    .attendee-name { font-weight: 600; color: #2d3748; }
    .status-tag { font-size: 13px; padding: 4px 10px; border-radius: 6px; font-weight: 700; }
    .status-tag.success { background-color: #c6f6d5; color: #22543d; }
    .status-tag.waitlist { background-color: #feebc8; color: #744210; }
    .empty-text { color: #a0aec0; font-size: 14px; font-style: italic; margin: 10px 0; text-align: center; }

    /* 🌐 頁尾 (Footer) 整合區域 */
    footer {
      margin-top: 40px;
      padding: 24px 15px;
      background-color: #edf2f7;
      border-top: 1px solid #e2e8f0;
      border-radius: 16px;
      font-size: 14px;
      color: #4a5568;
    }
    .footer-tools {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .lang-btn { 
      background: #ffffff; 
      border: 1px solid #cbd5e0; 
      padding: 6px 14px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-size: 13px; 
      font-weight: 600; 
      color: #4a5568;
      transition: all 0.2s; 
    }
    .lang-btn.active { 
      background: #4a5568; 
      color: white; 
      border-color: #4a5568; 
    }
    .contact-admin-btn { 
      display: inline-flex; 
      align-items: center; 
      gap: 5px; 
      padding: 6px 14px; 
      background-color: #5a7d7c; 
      color: white; 
      text-decoration: none; 
      font-size: 13px; 
      font-weight: 600; 
      border-radius: 8px; 
      transition: background-color 0.2s; 
      cursor: pointer; 
    }
    .contact-admin-btn:hover { background-color: #486564; }

    /* 🛠️ 管理員工具箱 */
    .admin-bar { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #cbd5e0; font-size: 13px; color: #718096; }
    .admin-btn-group { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
    .btn-admin-action { background: #718096; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: background 0.2s; }
    .btn-admin-action:hover { background: #4a5568; }
  </style>
</head>
<body>

  <div class="main-wrapper">
    <div class="card">
      
      <div id="main-banner" class="header-banner theme-default">
        <h1 id="event-title" data-i18n="appTitle">匹克球搶位系統</h1>
        <div id="event-date" class="date-sub" data-i18n="selectSessionHint">請點選下方場次卡片</div>
      </div>

      <div class="notice-card">
        <h3 data-i18n="noticeTitle">💡 報名溫馨提醒</h3>
        <span data-i18n="noticeContent">
          1. 會員開放時間為球敘前一天 <strong>18:00</strong>；非會員開放時間為 <strong>22:00</strong>。<br>
          2. 搶位時若剛好跨過開放秒數，可按 <strong>F5 重新整理</strong> 取得最新狀態。<br>
          3. 非會員報名時請務必填寫中文真實大名以利核對。
        </span>
      </div>

      <div class="status-box" id="status-box-container">
        <span id="status-label" data-i18n="remainingSeatsLabel">剩餘名額：</span>
        <strong id="seats" class="seats-highlight">--</strong>
      </div>

      <div id="auth-box" style="margin-bottom: 20px;">
        <p style="color: #4a5568; font-size: 15px; font-weight: 600;" data-i18n="googleAuthHint">請先驗證 Google 帳號：</p>
        <div id="g_id_onload"
             data-client_id="329337408769-4omaa4c4877335iv5thus8npk64bjbag.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
      </div>

      <div id="user-profile" class="user-info" style="display: none;">
        <span id="user-profile-text"></span>
        <button class="btn-logout" onclick="logout()" data-i18n="logoutBtn">登出</button>
      </div>

      <div id="non-member-name-box" class="input-box" style="display: none;">
        <label for="custom-name" data-i18n="inputNameLabel">✍️ 請輸入中文大名：</label>
        <input type="text" id="custom-name" placeholder="例如：王小明">
      </div>

      <div id="session-selector" class="session-container">
        <h3 style="margin-top:0; color:#4a5568; font-size: 16px; text-align: left;" data-i18n="selectSessionTitle">📅 選擇場次：</h3>
        <div id="session-buttons" data-i18n="loading">載入中...</div>
      </div>

      <div class="action-btn-group">
        <button id="btn-grab" class="btn-submit" onclick="startGrab()" disabled data-i18n="btnSelectFirst">請先選擇場次</button>
        <button id="btn-cancel" class="btn-cancel-action" onclick="startCancel()" disabled data-i18n="btnCancel">取消報名</button>
      </div>

      <div id="attendees-section" class="attendees-container" style="display: none;">
        <div class="attendees-title">
          <span id="attendees-title-text" data-i18n="attendeeListTitle">📋 報名名單</span>
          <span style="font-size: 13px; color: #a0aec0; font-weight: normal;" data-i18n="realtimeUpdate">(即時更新)</span>
        </div>
        <div class="attendees-list" id="attendees-list">
          <p class="empty-text" data-i18n="clickSessionToLoad">請點擊上方場次以載入名單</p>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <div class="footer-tools">
      <div class="lang-switch-container">
        <button id="btn-lang-zh" onclick="switchLanguage('zh')" class="lang-btn active">中文</button>
        <button id="btn-lang-en" onclick="switchLanguage('en')" class="lang-btn">English</button>
      </div>
      <a href="#" onclick="openContactAdmin(event)" class="contact-admin-btn" data-i18n="contactAdmin">
        ✉️ 聯絡管理員
      </a>
    </div>

    <div class="admin-bar">
      <span data-i18n="adminToolsTitle">🛠️ 管理員工具箱：</span>
      <div class="admin-btn-group">
        <button class="btn-admin-action" onclick="adminTogglePause()" data-i18n="adminPause">⏸️ 切換暫停/開放</button>
        <button class="btn-admin-action" onclick="adminAddUser()" data-i18n="adminAdd">➕ 手動新增球友</button>
        <button class="btn-admin-action" onclick="adminRemoveUser()" data-i18n="adminRemove">❌ 手動刪除球友</button>
        <button class="btn-admin-action" onclick="adminReorderUser()" data-i18n="adminReorder">↕️ 調整球友順序</button>
        <button class="btn-admin-action" onclick="triggerAdminSync()" data-i18n="adminSync">🔄 強制同步試算表</button>
      </div>
    </div>
  </footer>

  <script>
    let selectedSession = null;
    let userToken = null;
    let pollInterval = null;
    let isCurrentUserMember = false;
    let currentLang = localStorage.getItem('app_lang') || 'zh';

    // 📧 聯絡管理員：跨裝置郵件開啟邏輯
    function openContactAdmin(e) {
      e.preventDefault();
      const email = "easternstarpickleball@gmail.com";
      const subject = "【匹克球報名系統】問題反應與諮詢";
      
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

      if (isMobile) {
        window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}`;
      } else {
        const gmailWebUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${email}&su=${encodeURIComponent(subject)}`;
        window.open(gmailWebUrl, '_blank');
      }
    }

    // 🌐 雙語字典檔 (已加入溫馨提醒字典)
    const i18n = {
      zh: {
        appTitle: "匹克球團搶位系統",
        contactAdmin: "✉️ 聯絡管理員",
        noticeTitle: "💡 報名溫馨提醒",
        noticeContent: "1. 會員開放時間為球敘前一天 <strong>18:00</strong>；非會員開放時間為 <strong>22:00</strong>。<br>2. 搶位時若剛好跨過開放秒數，可按 <strong>F5 重新整理</strong> 取得最新狀態。<br>3. 非會員報名時請務必填寫中文真實大名以利核對。",
        selectSessionHint: "請點選下方場次卡片",
        remainingSeatsLabel: "剩餘名額：",
        waitlistLabel: "候補位置：",
        googleAuthHint: "請先驗證 Google 帳號：",
        logoutBtn: "登出",
        inputNameLabel: "✍️ 請輸入中文大名：",
        selectSessionTitle: "📅 選擇場次：",
        loading: "載入中...",
        btnSelectFirst: "請先選擇場次",
        btnGrabMain: "🔥 立刻報名（正取）",
        btnGrabWaitlist: "⚠️ 搶候補位",
        btnCompleted: "✅ 已完成報名",
        btnCancel: "取消報名",
        attendeeListTitle: "📋 報名名單",
        realtimeUpdate: "(即時更新)",
        clickSessionToLoad: "請點擊上方場次以載入名單",
        emptyAttendees: "目前尚無人報名，快來搶第一個！",
        adminToolsTitle: "🛠️ 管理員工具箱：",
        adminPause: "⏸️ 切換暫停/開放",
        adminAdd: "➕ 手動新增球友",
        adminRemove: "❌ 手動刪除球友",
        adminReorder: "↕️ 調整球友順序",
        adminSync: "🔄 強制同步試算表",
        seatsCount: "人",
        waitlistRank: "第 {num} 位",
        memberTag: " (會員)",
        nonMemberTag: " (非會員)"
      },
      en: {
        appTitle: "Pickleball Signup System",
        contactAdmin: "✉️ Contact Admin",
        noticeTitle: "💡 Notice",
        noticeContent: "1. Members: Opens 18:00 day before session. Non-members: Opens 22:00.<br>2. Please refresh (F5) at opening time to update page.<br>3. Non-members must enter real full name for verification.",
        selectSessionHint: "Please select a session card below",
        remainingSeatsLabel: "Seats Left: ",
        waitlistLabel: "Waitlist Spot: ",
        googleAuthHint: "Please verify Google Account:",
        logoutBtn: "Logout",
        inputNameLabel: "✍️ Enter Full Name:",
        selectSessionTitle: "📅 Select Session:",
        loading: "Loading...",
        btnSelectFirst: "Select a Session First",
        btnGrabMain: "🔥 Sign Up Now",
        btnGrabWaitlist: "⚠️ Join Waitlist",
        btnCompleted: "✅ Registered",
        btnCancel: "Cancel Registration",
        attendeeListTitle: "📋 Attendee List",
        realtimeUpdate: "(Live Update)",
        clickSessionToLoad: "Click session above to load attendees",
        emptyAttendees: "No signups yet. Be the first!",
        adminToolsTitle: "🛠️ Admin Tools:",
        adminPause: "⏸️ Toggle Pause/Open",
        adminAdd: "➕ Add Player",
        adminRemove: "❌ Remove Player",
        adminReorder: "↕️ Reorder Player",
        adminSync: "🔄 Force Sync Sheet",
        seatsCount: " Left",
        waitlistRank: "No. {num}",
        memberTag: " (Member)",
        nonMemberTag: " (Guest)"
      }
    };

    function switchLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('app_lang', lang);
      
      document.getElementById('btn-lang-zh').classList.toggle('active', lang === 'zh');
      document.getElementById('btn-lang-en').classList.toggle('active', lang === 'en');

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[lang][key]) {
          el.innerHTML = i18n[lang][key];
        }
      });

      if (selectedSession) {
        selectSession(selectedSession);
      } else {
        loadSessions();
      }
    }

    window.onload = function() {
      switchLanguage(currentLang);
      const savedToken = localStorage.getItem('pickleball_token');
      if (savedToken) {
        try {
          const payload = parseJwt(savedToken);
          if (payload && payload.exp * 1000 > Date.now() + 10000) {
            userToken = savedToken;
            showLoggedInState(payload.name, payload.email);
            loadSessions();
            startPolling();
          } else {
            localStorage.removeItem('pickleball_token');
            userToken = null;
            loadSessions();
          }
        } catch (e) {
          localStorage.removeItem('pickleball_token');
          userToken = null;
          loadSessions();
        }
      } else {
        loadSessions();
      }
    };

    function handleCredentialResponse(response) {
      userToken = response.credential;
      localStorage.setItem('pickleball_token', userToken);
      const responsePayload = parseJwt(userToken);
      showLoggedInState(responsePayload.name, responsePayload.email);
      loadSessions();
      startPolling();
    }

    function showLoggedInState(name, email) {
      document.getElementById('auth-box').style.display = 'none';
      const profileBox = document.getElementById('user-profile');
      profileBox.style.display = 'flex';
      document.getElementById('user-profile-text').innerText = `👤 ${name} (${email})`;
    }

    function logout() {
      localStorage.removeItem('pickleball_token');
      location.reload();
    }

    function startPolling() {
      if (!pollInterval) pollInterval = setInterval(loadSessions, 5000);
    }

    function parseJwt(token) {
      try {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
      } catch (e) { return null; }
    }

    function getDayPrefix(session) {
      const str = (session.name + " " + session.displayDate);
      if (str.includes("一") || str.includes("Mon")) return "mon";
      if (str.includes("二") || str.includes("Tue")) return "tue";
      if (str.includes("三") || str.includes("Wed")) return "wed";
      if (str.includes("四") || str.includes("Thu")) return "thu";
      if (str.includes("五") || str.includes("Fri")) return "fri";
      if (str.includes("六") || str.includes("Sat")) return "sat";
      if (str.includes("日") || str.includes("天") || str.includes("Sun")) return "sun";
      return "default";
    }

    function renderAttendees(attendees) {
      const section = document.getElementById('attendees-section');
      const listContainer = document.getElementById('attendees-list');
      const t = i18n[currentLang];

      section.style.display = 'block';

      if (!attendees || attendees.length === 0) {
        listContainer.innerHTML = `<p class="empty-text">${t.emptyAttendees}</p>`;
        return;
      }

      let html = '';
      attendees.forEach((item, index) => {
        const isWaitlist = item.status.includes('候補') || item.status.includes('Waitlist');
        const tagClass = isWaitlist ? 'waitlist' : 'success';
        const memberTag = item.isMember ? t.memberTag : t.nonMemberTag;

        html += `
          <div class="attendee-item">
            <span class="attendee-name">${index + 1}. ${item.name}</span>
            <span class="status-tag ${tagClass}">${item.status}${memberTag}</span>
          </div>
        `;
      });

      listContainer.innerHTML = html;
    }

    async function loadSessions() {
      try {
        const url = userToken ? `/api/sessions?token=${encodeURIComponent(userToken)}` : '/api/sessions';
        const res = await fetch(url);
        const data = await res.json();

        let sessions = [];
        if (Array.isArray(data)) {
          sessions = data;
        } else if (data && Array.isArray(data.sessions)) {
          sessions = data.sessions;
          isCurrentUserMember = data.isMember || false;
        }

        const nameBox = document.getElementById('non-member-name-box');
        if (nameBox) {
          nameBox.style.display = (userToken && !isCurrentUserMember) ? 'block' : 'none';
        }

        const btnContainer = document.getElementById('session-buttons');
        btnContainer.innerHTML = '';

        sessions.forEach(s => {
          const prefix = getDayPrefix(s);
          const btn = document.createElement('button');
          const isSelected = selectedSession && selectedSession.id === s.id;
          btn.className = `session-btn theme-${prefix} ${isSelected ? 'selected' : ''}`;
          
          const sessionTitle = (currentLang === 'en' && s.nameEn) ? s.nameEn : s.name;

          if (s.isOpen) {
            let statusText = "";
            if (s.remainingSeats > 0) {
              statusText = currentLang === 'en' 
                ? `Seats Left: ${s.remainingSeats}` 
                : `剩 ${s.remainingSeats} 位`;
            } else {
              statusText = currentLang === 'en' 
                ? `Waitlist Spot: No. ${s.waitlistCount + 1}` 
                : `候補第 ${s.waitlistCount + 1} 位`;
            }

            let userTag = s.isUserRegistered ? (currentLang === 'en' ? ' [Registered]' : ' [已報名]') : '';
            btn.innerText = `${sessionTitle} (${s.displayDate}) - ${statusText}${userTag}`;
            btn.onclick = () => selectSession(s);
          } else {
            const timeNotice = (currentLang === 'en' && s.openTimeStrEn) ? s.openTimeStrEn : s.openTimeStr;
            btn.innerText = `🔒 ${sessionTitle} (${s.displayDate}) - ${timeNotice}`;
            btn.disabled = true;
          }
          btnContainer.appendChild(btn);

          if (isSelected) {
            selectedSession = s; 
            updateSeatsDisplay(s);
            updateActionButtons(s);
            renderAttendees(s.attendees);
          }
        });
      } catch (err) {
        console.error("載入失敗：", err);
        document.getElementById('session-buttons').innerText = '❌ 連線失敗';
      }
    }

    function selectSession(session) {
      selectedSession = session;
      const prefix = getDayPrefix(session);
      const sessionTitle = (currentLang === 'en' && session.nameEn) ? session.nameEn : session.name;

      const banner = document.getElementById('main-banner');
      banner.className = `header-banner theme-${prefix}`;
      document.getElementById('event-title').innerText = sessionTitle;
      document.getElementById('event-date').innerText = `📅 ${session.displayDate}`;

      loadSessions();

      updateSeatsDisplay(session);
      updateActionButtons(session);

      document.getElementById('attendees-title-text').innerText = `📋 ${sessionTitle}`;
      renderAttendees(session.attendees);
    }

    function updateActionButtons(session) {
      const grabBtn = document.getElementById('btn-grab');
      const cancelBtn = document.getElementById('btn-cancel');
      const t = i18n[currentLang];

      if (session.isUserRegistered) {
        grabBtn.disabled = true;
        grabBtn.innerText = t.btnCompleted;
      } else {
        grabBtn.disabled = false;
        grabBtn.innerText = session.remainingSeats > 0 ? t.btnGrabMain : t.btnGrabWaitlist;
      }

      if (session.isUserRegistered) {
        cancelBtn.disabled = false;
        cancelBtn.innerText = `❌ ${t.btnCancel}`;
      } else {
        cancelBtn.disabled = true;
        cancelBtn.innerText = t.btnCancel;
      }
    }

    function updateSeatsDisplay(session) {
      const labelElem = document.getElementById('status-label');
      const seatsElem = document.getElementById('seats');
      const t = i18n[currentLang];

      if (session.remainingSeats > 0) {
        labelElem.innerText = t.remainingSeatsLabel;
        seatsElem.innerText = `${session.remainingSeats} ${t.seatsCount}`;
      } else {
        labelElem.innerText = t.waitlistLabel;
        seatsElem.innerText = t.waitlistRank.replace('{num}', session.waitlistCount + 1);
      }
    }

    async function startGrab() {
      if (!selectedSession || !userToken) {
        alert(currentLang === 'en' ? "Please login with Google first!" : "請先登入 Google 帳號！");
        return;
      }

      let customNameVal = '';
      if (!isCurrentUserMember) {
        customNameVal = document.getElementById('custom-name').value.trim();
        if (!customNameVal) {
          alert(currentLang === 'en' ? "Please enter your Full Name!" : '請輸入您的「中文大名」！');
          document.getElementById('custom-name').focus();
          return;
        }
      }

      const grabBtn = document.getElementById('btn-grab');
      grabBtn.disabled = true;

      try {
        const res = await fetch('/api/grab', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sessionId: selectedSession.id,
            token: userToken,
            customName: customNameVal
          })
        });

        const result = await res.json();
        alert(result.message);

        if (result.success) {
          loadSessions();
        } else {
          grabBtn.disabled = false;
        }
      } catch (err) {
        alert('❌ 送出失敗，請確認網路連線。');
        grabBtn.disabled = false;
      }
    }

    async function startCancel() {
      if (!selectedSession || !userToken) return;
      const title = (currentLang === 'en' && selectedSession.nameEn) ? selectedSession.nameEn : selectedSession.name;
      if (!confirm(`確定要取消【${title}】的報名嗎？`)) return;

      const cancelBtn = document.getElementById('btn-cancel');
      cancelBtn.disabled = true;

      try {
        const res = await fetch('/api/cancel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sessionId: selectedSession.id,
            token: userToken
          })
        });

        const result = await res.json();
        alert(result.message);

        if (result.success) {
          loadSessions();
        } else {
          cancelBtn.disabled = false;
        }
      } catch (err) {
        alert('❌ 取消失敗，請確認網路連線。');
        cancelBtn.disabled = false;
      }
    }

    // --- 管理員專用功能 ---
    async function adminTogglePause() {
      const secret = prompt(i18n[currentLang].adminToolsTitle);
      if (!secret) return;

      try {
        const res = await fetch('/api/admin/toggle-pause', {
          method: 'POST',
          headers: { 'x-admin-secret': secret }
        });
        const data = await res.json();
        alert(data.message);
      } catch (e) {
        alert("❌ 操作失敗，請檢查伺服器連線。");
      }
    }

    async function adminAddUser() {
      if (!selectedSession) return alert("請先選擇場次！");
      const secret = prompt("請輸入管理員密碼：");
      if (!secret) return;

      const name = prompt("請輸入球友姓名：");
      const email = prompt("請輸入球友 Email：");
      if (!name || !email) return alert("姓名與 Email 皆為必填！");

      try {
        const res = await fetch('/api/admin/add-user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
          body: JSON.stringify({ sessionId: selectedSession.id, name, email })
        });
        const data = await res.json();
        alert(data.message);
        if (data.success) loadSessions();
      } catch (e) {
        alert("❌ 新增失敗！");
      }
    }

    async function adminRemoveUser() {
      if (!selectedSession) return alert("請先選擇場次！");
      const secret = prompt("請輸入管理員密碼：");
      if (!secret) return;

      const email = prompt("請輸入要刪除的 Email：");
      if (!email) return;

      try {
        const res = await fetch('/api/admin/remove-user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
          body: JSON.stringify({ sessionId: selectedSession.id, email })
        });
        const data = await res.json();
        alert(data.message);
        if (data.success) loadSessions();
      } catch (e) {
        alert("❌ 刪除失敗！");
      }
    }

    async function adminReorderUser() {
      if (!selectedSession) return alert("請先選擇場次！");
      const secret = prompt("請輸入管理員密碼：");
      if (!secret) return;

      const email = prompt("請輸入球友 Email：");
      if (!email) return;

      const newPosition = prompt("請輸入目標位置（如：1）：");
      if (!newPosition) return;

      try {
        const res = await fetch('/api/admin/reorder-user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret },
          body: JSON.stringify({ sessionId: selectedSession.id, email, newPosition })
        });
        const data = await res.json();
        alert(data.message);
        if (data.success) loadSessions();
      } catch (e) {
        alert("❌ 調整失敗！");
      }
    }

    async function triggerAdminSync() {
      const secret = prompt("請輸入管理員密碼：");
      if (!secret) return;

      try {
        const res = await fetch('/api/admin/sync', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-secret': secret }
        });
        const result = await res.json();
        alert(result.message);
        if (result.success) loadSessions();
      } catch (e) {
        alert("❌ 同步失敗！");
      }
    }
  </script>
